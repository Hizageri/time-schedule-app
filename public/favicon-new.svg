<svg xmlns="http://www.w3.org/2000/svg" width="48" height="46" fill="none" viewBox="0 0 48 46">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    
    <!-- AI Sparkle gradient -->
    <radialGradient id="sparkleGradient">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:0.3" />
    </radialGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main shape with gradient -->
  <path d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z" fill="url(#bgGradient)" />
  
  <!-- Grid lines representing timetable structure -->
  <g opacity="0.3">
    <line x1="12" y1="8" x2="36" y2="8" stroke="#ffffff" stroke-width="0.5" />
    <line x1="12" y1="16" x2="36" y2="16" stroke="#ffffff" stroke-width="0.5" />
    <line x1="12" y1="24" x2="36" y2="24" stroke="#ffffff" stroke-width="0.5" />
    <line x1="12" y1="32" x2="36" y2="32" stroke="#ffffff" stroke-width="0.5" />
    
    <line x1="12" y1="8" x2="12" y2="40" stroke="#ffffff" stroke-width="0.5" />
    <line x1="20" y1="8" x2="20" y2="40" stroke="#ffffff" stroke-width="0.5" />
    <line x1="28" y1="8" x2="28" y2="40" stroke="#ffffff" stroke-width="0.5" />
    <line x1="36" y1="8" x2="36" y2="40" stroke="#ffffff" stroke-width="0.5" />
  </g>
  
  <!-- AI Circuit Pattern -->
  <g opacity="0.6">
    <path d="M15 12 L18 12 L18 15 L21 15" stroke="#e0f2fe" stroke-width="1" fill="none" stroke-linecap="round" />
    <circle cx="15" cy="12" r="1.5" fill="#e0f2fe" />
    <circle cx="18" cy="15" r="1.5" fill="#e0f2fe" />
    <circle cx="21" cy="15" r="1.5" fill="#e0f2fe" />
    
    <path d="M27 28 L30 28 L30 31 L33 31" stroke="#e0f2fe" stroke-width="1" fill="none" stroke-linecap="round" />
    <circle cx="27" cy="28" r="1.5" fill="#e0f2fe" />
    <circle cx="30" cy="31" r="1.5" fill="#e0f2fe" />
    <circle cx="33" cy="31" r="1.5" fill="#e0f2fe" />
  </g>
  
  <!-- AI Sparkle Effect -->
  <g filter="url(#glow)">
    <circle cx="24" cy="20" r="3" fill="url(#sparkleGradient)" opacity="0.8" />
    <circle cx="20" cy="24" r="2" fill="#ffffff" opacity="0.6" />
    <circle cx="28" cy="18" r="1.5" fill="#ffffff" opacity="0.4" />
  </g>
</svg>
